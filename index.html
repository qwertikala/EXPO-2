
<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencija Opreme - OCR + Barkod</title>
    <style>
        :root { --primary: #e67e22; --secondary: #9b59b6; --success: #27ae60; --dark: #2c3e50; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 15px;
            background: linear-gradient(135deg, #f0f4f8, #e5ebf3);
            color: #333;
        }
        h1 { text-align: center; color: var(--dark); margin: 15px 0 20px; font-size: 1.7em; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 18px; }
        button {
            padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            width: 100%; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-camera { background: var(--primary); color: white; }
        .btn-upload { background: var(--secondary); color: white; }
        .btn-backup { background: #34495e; color: white; }
        .btn-save { background: var(--success); color: white; font-size: 17px; }

        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        label { font-weight: bold; font-size: 14px; margin-bottom: 4px; display: block; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 140px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13.5px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--dark); color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); }
        .modal-content { background: white; margin: 5% auto; padding: 22px; width: 92%; max-width: 520px; border-radius: 12px; }
        .check-item { display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 8px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <h1>📦 Evidencija Opreme (OCR + Barkod)</h1>

    <div class="card">
        <button class="btn-camera" onclick="startCamera()">📸 Otvori kameru</button>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📤 Upload slike iz galerije</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
        <button class="btn-backup" onclick="exportBackup()">💾 Backup svih slika (ZIP)</button>
    </div>

    <div id="cameraContainer" class="card" style="display: none;">
        <div style="text-align:center">
            <video id="video" autoplay playsinline style="width:100%; max-width:500px; border-radius:10px;"></video>
            <canvas id="canvas" style="display:none"></canvas>
            <button onclick="capturePhoto()" style="background:#27ae60;margin-top:10px">📷 Slika sada</button>
            <button onclick="stopCamera()" style="background:#e74c3c;margin-top:10px">❌ Zatvori kameru</button>
        </div>
    </div>

    <div class="card">
        <form id="equipmentForm">
            <div class="row">
                <div class="col"><label>Naziv objekta:</label><input type="text" id="facility" placeholder="npr. Objekt A" required></div>
                <div class="col"><label>IP Adresa:</label><input type="text" id="ipAddress"></div>
            </div>
            <div class="row">
                <div class="col"><label>Proizvođač:</label><input type="text" id="brand" value="BOSCH"></div>
                <div class="col"><label>Model:</label><input type="text" id="model"></div>
                <div class="col"><label>Oznaka / Tip:</label><input type="text" id="type"></div>
            </div>
            <div class="row">
                <div class="col"><label>Mat/N:</label><input type="text" id="matNo"></div>
                <div class="col"><label>S/N ili Barkod:</label><input type="text" id="sn"></div>
                <div class="col" style="max-width:80px"><label>Količina:</label><input type="number" id="qty" value="1"></div>
            </div>
            <div><label>Opis:</label><input type="text" id="description"></div>
            <div><label>Komentar:</label><textarea id="comment" rows="2"></textarea></div>
            <button type="submit" class="btn-save">💾 SAČUVAJ U TABELU</button>
        </form>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3>🔍 Pročitani podaci</h3>
            <div id="checkList"></div>
            <button class="btn-save" onclick="applyCheckedData()">✅ POTVRDI I PRENESI</button>
            <button onclick="closeModal()" style="background:#e74c3c;color:white;margin-top:10px;width:100%">❌ Odustani</button>
        </div>
    </div>

    <div class="card">
        <h3>Lista opreme</h3>
        <button onclick="exportToCSV()" style="background:#2980b9">📥 Preuzmi CSV</button>
        <table id="dataTable">
            <thead>
                <tr><th>#</th><th>Objekat</th><th>IP</th><th>Brand</th><th>Model</th><th>Tip</th>
                <th>Mat/N</th><th>S/N</th><th>Opis</th><th>Kol.</th><th>Komentar</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let videoStream = null;
        let worker = null;
        let imageDB = JSON.parse(localStorage.getItem('boschEquipmentDB') || '[]');
        let count = 0;

        // Ograničenje na 15 slika
        function limitDB() {
            if (imageDB.length > 15) {
                imageDB = imageDB.slice(-15); // zadrži samo poslednjih 15
                localStorage.setItem('boschEquipmentDB', JSON.stringify(imageDB));
            }
        }

        async function initWorker() {
            if (!worker) worker = await Tesseract.createWorker(['eng', 'deu']);
            return worker;
        }

        function preprocessCanvas(canvas) { /* isti kod kao ranije */ 
            const ctx = canvas.getContext('2d');
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11;
                let val = Math.max(0, Math.min(255, (gray - 70)*2.1));
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imgData, 0, 0);
            return canvas.toDataURL('image/png');
        }

        function detectBarcode(canvas) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            try {
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                return code ? code.data : null;
            } catch(e) { return null; }
        }

        async function processImage(canvas) {
            const loading = document.createElement('div');
            loading.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:25px;border-radius:12px;box-shadow:0 4px 25px rgba(0,0,0,0.3);z-index:9999;';
            loading.textContent = '🔄 Čitam tekst i barkod...';
            document.body.appendChild(loading);

            try {
                await initWorker();
                const barcode = detectBarcode(canvas);
                const processedUrl = preprocessCanvas(canvas);
                const { data: { text } } = await worker.recognize(processedUrl);

                loading.remove();
                showReviewModal(text, barcode);
            } catch (err) {
                loading.remove();
                alert("Greška: " + err.message);
            }
        }

        function showReviewModal(ocrText, barcode) {
            const listDiv = document.getElementById('checkList');
            listDiv.innerHTML = `<p><strong>Pročitano:</strong><br><small>${ocrText}</small></p>`;

            if (barcode) addField(listDiv, 'sn', 'BARKOD / S/N', barcode);
            addField(listDiv, 'brand', 'Proizvođač', 'BOSCH');
            addField(listDiv, 'model', 'Model', '');
            addField(listDiv, 'matNo', 'Mat/N', ocrText.match(/F01U[A-Z0-9-]+/i)?.[0] || '');
            addField(listDiv, 'description', 'Opis', ocrText.split('\n')[0] || '');

            document.getElementById('reviewModal').style.display = 'block';
        }

        function addField(container, id, label, value) {
            if (!value) return;
            const item = document.createElement('div');
            item.className = 'check-item';
            item.innerHTML = `
                <input type="checkbox" id="check_${id}" checked>
                <label style="min-width:140px">${label}:</label>
                <input type="text" id="val_${id}" value="${value}">
            `;
            container.appendChild(item);
        }

        function applyCheckedData() {
            const fields = ['brand','model','type','matNo','sn','description'];
            fields.forEach(id => {
                if (document.getElementById(`check_${id}`)?.checked) {
                    const val = document.getElementById(`val_${id}`).value;
                    if (val) document.getElementById(id).value = val;
                }
            });
            closeModal();
        }

        function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }

        async function startCamera() { /* isti kod */ 
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                document.getElementById('video').srcObject = videoStream;
                document.getElementById('cameraContainer').style.display = 'block';
            } catch (err) { alert("Kamera nije dostupna."); }
        }

        function stopCamera() {
            videoStream?.getTracks().forEach(t => t.stop());
            document.getElementById('cameraContainer').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            stopCamera();
            processImage(canvas);
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    processImage(canvas);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Forma submit (isti kod)
        document.getElementById('equipmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            count++;
            const tbody = document.querySelector('#dataTable tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${count}</td>
                <td>${document.getElementById('facility').value}</td>
                <td>${document.getElementById('ipAddress').value}</td>
                <td>${document.getElementById('brand').value}</td>
                <td>${document.getElementById('model').value}</td>
                <td>${document.getElementById('type').value}</td>
                <td>${document.getElementById('matNo').value}</td>
                <td>${document.getElementById('sn').value}</td>
                <td>${document.getElementById('description').value}</td>
                <td>${document.getElementById('qty').value}</td>
                <td>${document.getElementById('comment').value}</td>
            `;
            tbody.appendChild(row);

            // Reset
            ['model','type','matNo','sn','description','comment'].forEach(id => document.getElementById(id).value = '');
        });

        function exportToCSV() { /* isti kod kao ranije */ 
            let csv = [];
            let rows = document.querySelectorAll("#dataTable tr");
            for (let i = 0; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
                }
                csv.push(row.join(","));
            }
            const blob = new Blob(["\ufeff" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.download = "evidencija_opreme.csv";
            link.href = URL.createObjectURL(blob);
            link.click();
        }

        async function exportBackup() {
            if (imageDB.length === 0) return alert("Nema sačuvanih slika.");
            const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
            const zip = new JSZip();
            imageDB.forEach((item, i) => {
                const base64 = item.image.split(',')[1];
                zip.file(`etiketa_${i+1}.png`, base64, {base64: true});
            });
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `bosch_backup_${new Date().toISOString().slice(0,10)}.zip`;
            link.click();
        }

        // Ograničenje kvote
        limitDB();
    </script>
</body>
</html>
