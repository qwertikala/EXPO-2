<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencija Opreme na Objektu</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h2 { color: #1a252f; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        textarea { resize: vertical; height: 60px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #219150; }
        button.btn-export { background-color: #2980b9; margin-top: 10px; }
        button.btn-export:hover { background-color: #1c5980; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <h2>📦 Evidencija Opreme na Objektu</h2>

    <div class="card">
        <h3>Unos novog uređaja</h3>
        <form id="equipmentForm">
            <!-- PRVI RED: Lokacija i Mreža -->
            <div class="row">
                <div class="col form-group">
                    <label>Naziv objekta:</label>
                    <input type="text" id="facility" placeholder="npr. Objekt A - TC Galerija" required>
                </div>
                <div class="col form-group">
                    <label>IP Adresa:</label>
                    <input type="text" id="ipAddress" placeholder="npr. 192.168.1.50">
                </div>
            </div>

            <!-- DRUGI RED: Osnovni podaci o uređaju -->
            <div class="row">
                <div class="col form-group">
                    <label>Proizvođač:</label>
                    <input type="text" id="brand" value="BOSCH" required>
                </div>
                <div class="col form-group">
                    <label>Model:</label>
                    <input type="text" id="model" placeholder="npr. Access Modular Controller 2" required>
                </div>
                <div class="col form-group">
                    <label>Oznaka / Tip:</label>
                    <input type="text" id="type" placeholder="npr. API-AMC2-16IOE">
                </div>
            </div>

            <!-- TREĆI RED: Brojevi i količina -->
            <div class="row">
                <div class="col form-group">
                    <label>Mat/N (Kataloški broj):</label>
                    <input type="text" id="matNo" placeholder="npr. F01U411051">
                </div>
                <div class="col form-group">
                    <label>Serijski broj (S/N):</label>
                    <input type="text" id="sn" placeholder="npr. 041072457418100061">
                </div>
                <div class="col form-group" style="max-width: 100px;">
                    <label>Količina:</label>
                    <input type="number" id="qty" value="1">
                </div>
            </div>

            <!-- ČETVRTI RED: Opis i Komentar/Napomena -->
            <div class="row">
                <div class="col form-group">
                    <label>Opis uređaja:</label>
                    <input type="text" id="description" placeholder="npr. Extension board with 16-input 16-output">
                </div>
            </div>
            <div class="row">
                <div class="col form-group">
                    <label>Komentar / Napomena (Sprat, stanje, uočeni problemi...):</label>
                    <textarea id="comment" placeholder="npr. 2. sprat, server sala, rek 3. Kutija malo izgrebana sa strane."></textarea>
                </div>
            </div>

            <button type="submit">➕ Dodaj u tabelu</button>
        </form>
    </div>

    <div class="card">
        <h3>Lista opreme na objektu</h3>
        <button class="btn-export" onclick="exportToCSV()">📥 Preuzmi CSV za Excel</button>
        <br><br>
        <div class="table-responsive">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Objekat</th>
                        <th>IP Adresa</th>
                        <th>Proizvođač</th>
                        <th>Model</th>
                        <th>Tip / Oznaka</th>
                        <th>Mat/N</th>
                        <th>Serijski Broj (S/N)</th>
                        <th>Opis</th>
                        <th>Kol.</th>
                        <th>Komentar / Napomena</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Podaci stižu ovde -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let count = 0;

        document.getElementById('equipmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            count++;
            const facility = document.getElementById('facility').value;
            const ipAddress = document.getElementById('ipAddress').value;
            const brand = document.getElementById('brand').value;
            const model = document.getElementById('model').value;
            const type = document.getElementById('type').value;
            const matNo = document.getElementById('matNo').value;
            const sn = document.getElementById('sn').value;
            const qty = document.getElementById('qty').value;
            const description = document.getElementById('description').value;
            const comment = document.getElementById('comment').value;

            const tbody = document.querySelector('#dataTable tbody');
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${count}</td>
                <td><b>${facility}</b></td>
                <td>${ipAddress}</td>
                <td>${brand}</td>
                <td>${model}</td>
                <td>${type}</td>
                <td>${matNo}</td>
                <td>${sn}</td>
                <td>${description}</td>
                <td>${qty}</td>
                <td>${comment}</td>
            `;

            tbody.appendChild(row);

            // Resetujemo polja za unos uređaja, ali PAMTIMO Objekat i IP prefiks radi bržeg kucanja
            document.getElementById('model').value = '';
            document.getElementById('type').value = '';
            document.getElementById('matNo').value = '';
            document.getElementById('sn').value = '';
            document.getElementById('description').value = '';
            document.getElementById('comment').value = '';
            document.getElementById('qty').value = '1';
        });

        function exportToCSV() {
            let csv = [];
            let rows = document.querySelectorAll("table tr");
            
            for (let i = 0; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    // Zamena novih redova u tekstu razmakom da ne pokvari CSV format
                    let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ");
                    row.push('"' + data + '"');
                }
                csv.push(row.join(","));        
            }

            let csvFile = new Blob(["\ufeff" + csv.join("\n")], {type: "text/csv;charset=utf-8;"}); // \ufeff dodaje UTF-8 BOM za naša slova u Excelu
            let downloadLink = document.createElement("a");
            downloadLink.download = "evidencija_opreme.csv";
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
        }
    </script>
</body>
</html>
