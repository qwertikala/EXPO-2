
<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencija Opreme - OCR + Barkod</title>
    <style>
        :root { --primary: #e67e22; --secondary: #9b59b6; --success: #27ae60; --dark: #2c3e50; --danger: #e74c3c; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 15px;
            background: linear-gradient(135deg, #f0f4f8, #e5ebf3);
            color: #333;
        }
        h1 { text-align: center; color: var(--dark); margin: 15px 0 20px; font-size: 1.7em; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 18px; }
        button {
            padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            width: 100%; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-camera { background: var(--primary); color: white; }
        .btn-upload { background: var(--secondary); color: white; }
        .btn-backup { background: #34495e; color: white; }
        .btn-save { background: var(--success); color: white; font-size: 17px; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-small { width: auto; padding: 6px 10px; font-size: 12px; margin: 0; }

        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        label { font-weight: bold; font-size: 14px; margin-bottom: 4px; display: block; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 140px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; display: block; overflow-x: auto; white-space: nowrap; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--dark); color: white; position: sticky; top: 0; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 22px; width: 92%; max-width: 520px; border-radius: 12px; }
        .check-item { display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 8px; flex-wrap: wrap; }
        .raw-text-box { max-height: 140px; overflow-y: auto; background: #f4f4f4; padding: 8px; border-radius: 6px; font-size: 12px; white-space: pre-wrap; }
        .badge { display: inline-block; background: #eee; border-radius: 4px; padding: 2px 6px; font-size: 11px; margin-left: 6px; }
        .badge-ok { background: #d4f5dd; color: #1e7e34; }
        .badge-warn { background: #fdecea; color: #a94442; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <h1>📦 Evidencija Opreme (OCR + Barkod)</h1>

    <div class="card">
        <button class="btn-camera" onclick="startCamera()">📸 Otvori kameru</button>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📤 Upload slike iz galerije</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
        <button class="btn-backup" onclick="exportBackup()">💾 Backup svih slika (ZIP)</button>
    </div>

    <div id="cameraContainer" class="card" style="display: none;">
        <div style="text-align:center">
            <video id="video" autoplay playsinline style="width:100%; max-width:500px; border-radius:10px;"></video>
            <canvas id="canvas" style="display:none"></canvas>
            <button onclick="capturePhoto()" style="background:#27ae60;margin-top:10px">📷 Slika sada</button>
            <button onclick="stopCamera()" style="background:#e74c3c;margin-top:10px">❌ Zatvori kameru</button>
        </div>
    </div>

    <div class="card">
        <form id="equipmentForm">
            <div class="row">
                <div class="col"><label>Naziv objekta:</label><input type="text" id="facility" placeholder="npr. Objekt A" required></div>
                <div class="col"><label>IP Adresa:</label><input type="text" id="ipAddress" placeholder="192.168.x.x"></div>
                <div class="col"><label>MAC Adresa:</label><input type="text" id="macAddress" placeholder="00:1A:2B:3C:4D:5E"></div>
            </div>
            <div class="row">
                <div class="col"><label>Proizvođač:</label><input type="text" id="brand" value="BOSCH"></div>
                <div class="col"><label>Model:</label><input type="text" id="model"></div>
                <div class="col"><label>Oznaka / Tip:</label><input type="text" id="type"></div>
            </div>
            <div class="row">
                <div class="col"><label>Mat/N:</label><input type="text" id="matNo"></div>
                <div class="col"><label>S/N:</label><input type="text" id="sn"></div>
                <div class="col" style="max-width:80px"><label>Količina:</label><input type="number" id="qty" value="1"></div>
            </div>
            <div><label>Opis:</label><input type="text" id="description"></div>
            <div><label>Komentar:</label><textarea id="comment" rows="2"></textarea></div>
            <button type="submit" class="btn-save">💾 SAČUVAJ U TABELU</button>
        </form>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3>🔍 Pročitani podaci</h3>
            <div id="rawTextPreview"></div>
            <div id="checkList"></div>
            <button class="btn-save" onclick="applyCheckedData()">✅ POTVRDI I PRENESI</button>
            <button onclick="closeModal()" style="background:#e74c3c;color:white;margin-top:10px;width:100%">❌ Odustani</button>
        </div>
    </div>

    <div class="card">
        <h3>Lista opreme</h3>
        <div class="row">
            <button onclick="exportToCSV()" style="background:#2980b9">📥 Preuzmi CSV</button>
            <button onclick="clearTable()" class="btn-danger">🗑️ Obriši tabelu</button>
        </div>
        <table id="dataTable">
            <thead>
                <tr><th>#</th><th>Objekat</th><th>IP</th><th>MAC</th><th>Brand</th><th>Model</th><th>Tip</th>
                <th>Mat/N</th><th>S/N</th><th>Opis</th><th>Kol.</th><th>Komentar</th><th></th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let videoStream = null;
        let worker = null;
        let imageDB = JSON.parse(localStorage.getItem('boschEquipmentDB') || '[]');
        let equipmentRows = JSON.parse(localStorage.getItem('boschEquipmentRows') || '[]');
        let lastCapturedImage = null; // dataURL of the image currently being reviewed
        let count = equipmentRows.length;

        // ---------- Persistence helpers ----------
        function saveImageDB() {
            // Ograničenje na 15 slika da ne pređe localStorage kvotu
            if (imageDB.length > 15) imageDB = imageDB.slice(-15);
            try {
                localStorage.setItem('boschEquipmentDB', JSON.stringify(imageDB));
            } catch (e) {
                // Ako se localStorage prepuni, obriši najstarije slike i pokušaj ponovo
                imageDB = imageDB.slice(-5);
                try { localStorage.setItem('boschEquipmentDB', JSON.stringify(imageDB)); } catch(e2) {}
            }
        }
        function saveRows() {
            localStorage.setItem('boschEquipmentRows', JSON.stringify(equipmentRows));
        }
        function renderRows() {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            equipmentRows.forEach((r, idx) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>${escapeHtml(r.facility)}</td>
                    <td>${escapeHtml(r.ip)}</td>
                    <td>${escapeHtml(r.mac)}</td>
                    <td>${escapeHtml(r.brand)}</td>
                    <td>${escapeHtml(r.model)}</td>
                    <td>${escapeHtml(r.type)}</td>
                    <td>${escapeHtml(r.matNo)}</td>
                    <td>${escapeHtml(r.sn)}</td>
                    <td>${escapeHtml(r.description)}</td>
                    <td>${escapeHtml(r.qty)}</td>
                    <td>${escapeHtml(r.comment)}</td>
                    <td><button class="btn-small btn-danger" onclick="deleteRow(${idx})">✕</button></td>
                `;
                tbody.appendChild(row);
            });
        }
        function deleteRow(idx) {
            equipmentRows.splice(idx, 1);
            saveRows();
            renderRows();
        }
        function clearTable() {
            if (!confirm('Da li sigurno želiš da obrišeš celu tabelu?')) return;
            equipmentRows = [];
            saveRows();
            renderRows();
        }
        function escapeHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        async function initWorker() {
            if (!worker) worker = await Tesseract.createWorker(['eng', 'deu']);
            return worker;
        }

        // Skalira male slike na veću rezoluciju - poboljšava OCR na nalepnicama fotografisanim izdaleka
        function upscaleIfNeeded(sourceCanvas) {
            const minWidth = 1200;
            if (sourceCanvas.width >= minWidth) return sourceCanvas;
            const scale = minWidth / sourceCanvas.width;
            const out = document.createElement('canvas');
            out.width = Math.round(sourceCanvas.width * scale);
            out.height = Math.round(sourceCanvas.height * scale);
            const ctx = out.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(sourceCanvas, 0, 0, out.width, out.height);
            return out;
        }

        function preprocessCanvas(canvas) {
            const working = upscaleIfNeeded(canvas);
            const ctx = working.getContext('2d');
            let imgData = ctx.getImageData(0, 0, working.width, working.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11;
                let val = Math.max(0, Math.min(255, (gray - 70)*2.1));
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imgData, 0, 0);
            return working.toDataURL('image/png');
        }

        function detectBarcode(canvas) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            try {
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                return code ? code.data : null;
            } catch(e) { return null; }
        }

        // ---------- Smart parsing of OCR text ----------
        // Prepoznaje MAC, IP, S/N, Mat/N, Tip, Model i brend na osnovu tipičnih oznaka
        // koje se nalaze na nalepnicama opreme (Bosch i slično).
        function parseOcrText(rawText) {
            const t = rawText.replace(/\r/g, '');
            const result = {};

            // MAC adresa: 6 parova hex cifara razdvojenih sa : ili -
            const macMatch = t.match(/\b([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}\b/);
            if (macMatch) result.mac = macMatch[0].toUpperCase().replace(/-/g, ':');

            // IP adresa (IPv4)
            const ipMatches = t.match(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g);
            if (ipMatches) {
                // izbegni da IP adresa slučajno bude deo MAC-a ili nekog drugog broja
                const validIp = ipMatches.find(ip => ip.split('.').every(o => Number(o) <= 255));
                if (validIp) result.ip = validIp;
            }

            // Mat/N (Bosch: "Mat.-Nr.", "Order no.", "Best.-Nr.") ili poznati Bosch prefiksi
            let matNoMatch = t.match(/(?:Mat\.?\s?-?\s?Nr\.?|Order\s?No\.?|Best\.?\s?-?\s?Nr\.?)[:\s]*([A-Z0-9\-\.\/]{4,})/i);
            if (matNoMatch) {
                result.matNo = matNoMatch[1].trim();
            } else {
                const knownPrefix = t.match(/\b(F01U[A-Z0-9]+|NDA-[A-Z0-9\-]+|NBN-[A-Z0-9\-]+|NDP-[A-Z0-9\-]+|NUC-[A-Z0-9\-]+|VG5-[A-Z0-9\-]+)\b/i);
                if (knownPrefix) result.matNo = knownPrefix[0];
            }

            // Serijski broj
            let snMatch = t.match(/(?:S\s?\/?\s?N\.?|Ser\.?\s?No\.?|Serial\s?No\.?|Serial\s?Number)[:\s]*([A-Z0-9\-]{4,})/i);
            if (snMatch) result.sn = snMatch[1].trim();

            // Tip / Type
            let typeMatch = t.match(/(?:^|\n)\s*Typ[e]?\.?[:\s]+([A-Z0-9\-\/\. ]{2,40})/i);
            if (typeMatch) result.type = typeMatch[1].trim().split(/\s{2,}/)[0];

            // Model
            let modelMatch = t.match(/(?:^|\n)\s*Model[:\s]+([A-Z0-9\-\/\. ]{2,40})/i);
            if (modelMatch) result.model = modelMatch[1].trim().split(/\s{2,}/)[0];

            // Brend - traži poznata imena proizvođača opreme za video nadzor
            const brands = ['BOSCH','HIKVISION','DAHUA','AXIS','HANWHA','PANASONIC','SONY','UNIVIEW','VIVOTEK','SAMSUNG'];
            const upperText = t.toUpperCase();
            for (const b of brands) {
                if (upperText.includes(b)) { result.brand = b; break; }
            }

            return result;
        }

        async function processImage(canvas) {
            const loading = document.createElement('div');
            loading.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:25px;border-radius:12px;box-shadow:0 4px 25px rgba(0,0,0,0.3);z-index:9999;text-align:center;';
            loading.textContent = '🔄 Čitam tekst i barkod...';
            document.body.appendChild(loading);

            try {
                await initWorker();
                const barcode = detectBarcode(canvas);
                const processedUrl = preprocessCanvas(canvas);
                const { data: { text } } = await worker.recognize(processedUrl);

                // sačuvaj original (nepreprocesovan) kao thumbnail za backup
                lastCapturedImage = canvas.toDataURL('image/jpeg', 0.85);

                loading.remove();
                showReviewModal(text, barcode);
            } catch (err) {
                loading.remove();
                alert("Greška: " + err.message);
            }
        }

        function showReviewModal(ocrText, barcode) {
            const listDiv = document.getElementById('checkList');
            listDiv.innerHTML = '';
            document.getElementById('rawTextPreview').innerHTML =
                `<label>Sirovi OCR tekst:</label><div class="raw-text-box">${escapeHtml(ocrText) || '(ništa pročitano)'}</div>`;

            const parsed = parseOcrText(ocrText);

            if (barcode) addField(listDiv, 'sn', 'BARKOD / S/N', barcode, true);
            addField(listDiv, 'mac', 'MAC Adresa', parsed.mac || '', false);
            addField(listDiv, 'ip', 'IP Adresa', parsed.ip || '', false);
            addField(listDiv, 'brand', 'Proizvođač', parsed.brand || 'BOSCH', false);
            addField(listDiv, 'model', 'Model', parsed.model || '', false);
            addField(listDiv, 'type', 'Tip', parsed.type || '', false);
            addField(listDiv, 'matNo', 'Mat/N', parsed.matNo || '', false);
            if (!barcode) addField(listDiv, 'sn', 'S/N', parsed.sn || '', false);

            document.getElementById('reviewModal').style.display = 'block';
        }

        function addField(container, id, label, value, forceShow) {
            if (!value && !forceShow) return;
            const item = document.createElement('div');
            item.className = 'check-item';
            item.innerHTML = `
                <input type="checkbox" id="check_${id}" ${value ? 'checked' : ''}>
                <label style="min-width:120px">${label}:</label>
                <input type="text" id="val_${id}" value="${escapeHtml(value)}" style="flex:1;min-width:150px">
            `;
            container.appendChild(item);
        }

        function applyCheckedData() {
            const fieldToInputId = { brand: 'brand', model: 'model', type: 'type', matNo: 'matNo', sn: 'sn', mac: 'macAddress', ip: 'ipAddress' };
            Object.entries(fieldToInputId).forEach(([id, targetInputId]) => {
                const checkbox = document.getElementById(`check_${id}`);
                if (checkbox?.checked) {
                    const val = document.getElementById(`val_${id}`).value;
                    if (val) document.getElementById(targetInputId).value = val;
                }
            });

            // sačuvaj sliku u imageDB za backup
            if (lastCapturedImage) {
                imageDB.push({ image: lastCapturedImage, timestamp: new Date().toISOString() });
                saveImageDB();
                lastCapturedImage = null;
            }

            closeModal();
        }

        function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }

        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                document.getElementById('video').srcObject = videoStream;
                document.getElementById('cameraContainer').style.display = 'block';
            } catch (err) { alert("Kamera nije dostupna."); }
        }

        function stopCamera() {
            videoStream?.getTracks().forEach(t => t.stop());
            document.getElementById('cameraContainer').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            stopCamera();
            processImage(canvas);
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    processImage(canvas);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // omogući ponovni upload istog fajla
        }

        document.getElementById('equipmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const entry = {
                facility: document.getElementById('facility').value,
                ip: document.getElementById('ipAddress').value,
                mac: document.getElementById('macAddress').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                type: document.getElementById('type').value,
                matNo: document.getElementById('matNo').value,
                sn: document.getElementById('sn').value,
                description: document.getElementById('description').value,
                qty: document.getElementById('qty').value,
                comment: document.getElementById('comment').value
            };
            equipmentRows.push(entry);
            saveRows();
            renderRows();

            // Reset - zadrži objekat/IP jer se obično ne menjaju u nizu unosa za isti sistem
            ['macAddress','model','type','matNo','sn','description','comment'].forEach(id => document.getElementById(id).value = '');
        });

        function exportToCSV() {
            const headers = ['#','Objekat','IP','MAC','Brand','Model','Tip','Mat/N','S/N','Opis','Kol.','Komentar'];
            let csv = [headers.map(h => '"' + h + '"').join(',')];
            equipmentRows.forEach((r, idx) => {
                const vals = [idx+1, r.facility, r.ip, r.mac, r.brand, r.model, r.type, r.matNo, r.sn, r.description, r.qty, r.comment];
                csv.push(vals.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(','));
            });
            const blob = new Blob(["\ufeff" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.download = "evidencija_opreme.csv";
            link.href = URL.createObjectURL(blob);
            link.click();
        }

        async function exportBackup() {
            if (imageDB.length === 0) return alert("Nema sačuvanih slika. Slike se čuvaju tek kada potvrdiš podatke sa nalepnice (dugme 'POTVRDI I PRENESI').");
            const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
            const zip = new JSZip();
            imageDB.forEach((item, i) => {
                const base64 = item.image.split(',')[1];
                zip.file(`etiketa_${i+1}_${item.timestamp.slice(0,10)}.jpg`, base64, {base64: true});
            });
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `bosch_backup_${new Date().toISOString().slice(0,10)}.zip`;
            link.click();
        }

        // ---------- Inicijalizacija pri učitavanju ----------
        renderRows();
    </script>
</body>
</html>
