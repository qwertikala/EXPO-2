```html
<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencija Opreme - Bosch OCR + Barkod</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f6f9; color: #333; }
        h2 { color: #1a252f; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 3px; font-size: 13px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 140px; }
        button { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; margin-bottom: 8px; }
        .btn-camera { background-color: #e67e22; color: white; }
        .btn-upload { background-color: #9b59b6; color: white; }
        .btn-save { background-color: #27ae60; color: white; }
        .btn-export, .btn-backup { background-color: #2980b9; color: white; }
        .btn-backup { background-color: #34495e; }

        #video { width: 100%; max-width: 500px; border-radius: 8px; }
        .camera-container { text-align: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 520px; border-radius: 8px; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; background: #f8f9fa; padding: 8px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <h2>📦 Evidencija Opreme (OCR + Barkod)</h2>

    <div class="card">
        <button class="btn-camera" onclick="startCamera()">📸 Otvori kameru</button>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📤 Upload slike iz galerije</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
        <button class="btn-backup" onclick="exportBackup()">💾 Backup svih slika (ZIP)</button>
    </div>

    <!-- Kamera -->
    <div id="cameraContainer" class="card" style="display: none;">
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display: none;"></canvas>
            <button onclick="capturePhoto()" style="background:#27ae60">📷 Slika sada</button>
            <button onclick="stopCamera()" style="background:#e74c3c">❌ Zatvori kameru</button>
        </div>
    </div>

    <!-- Forma -->
    <div class="card">
        <form id="equipmentForm">
            <div class="row">
                <div class="col form-group"><label>Naziv objekta:</label><input type="text" id="facility" placeholder="npr. Objekt A" required></div>
                <div class="col form-group"><label>IP Adresa:</label><input type="text" id="ipAddress" placeholder="192.168.1.X"></div>
            </div>
            <div class="row">
                <div class="col form-group"><label>Proizvođač:</label><input type="text" id="brand" value="BOSCH" required></div>
                <div class="col form-group"><label>Model:</label><input type="text" id="model"></div>
                <div class="col form-group"><label>Oznaka / Tip:</label><input type="text" id="type"></div>
            </div>
            <div class="row">
                <div class="col form-group"><label>Mat/N:</label><input type="text" id="matNo" placeholder="F01U..."></div>
                <div class="col form-group"><label>Serijski broj / Barkod:</label><input type="text" id="sn"></div>
                <div class="col form-group" style="max-width:80px;"><label>Količina:</label><input type="number" id="qty" value="1"></div>
            </div>
            <div class="form-group"><label>Opis:</label><input type="text" id="description"></div>
            <div class="form-group"><label>Komentar:</label><textarea id="comment"></textarea></div>
            <button type="submit" class="btn-save">💾 SAČUVAJ U TABELU</button>
        </form>
    </div>

    <!-- Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3>🔍 Pročitani podaci sa etikete</h3>
            <div id="checkList"></div>
            <button class="btn-save" onclick="applyCheckedData()">✅ POTVRDI</button>
            <button style="background:#e74c3c;color:white;margin-top:8px;" onclick="closeModal()">❌ Odustani</button>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <h3>Lista opreme na objektu</h3>
        <button class="btn-export" onclick="exportToCSV()">📥 Preuzmi CSV</button>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>#</th><th>Objekat</th><th>IP</th><th>Proizvođač</th><th>Model</th>
                    <th>Tip</th><th>Mat/N</th><th>S/N</th><th>Opis</th><th>Kol.</th><th>Komentar</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let videoStream = null;
        let worker = null;
        let imageDB = JSON.parse(localStorage.getItem('boschEquipmentDB') || '[]');
        let count = 0;

        async function initWorker() {
            if (!worker) {
                worker = await Tesseract.createWorker(['eng', 'deu']);
            }
            return worker;
        }

        function preprocessCanvas(canvas) {
            const ctx = canvas.getContext('2d');
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
                let val = Math.max(0, Math.min(255, (gray - 70) * 2.1));
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imgData, 0, 0);
            return canvas.toDataURL('image/png');
        }

        function detectBarcode(canvas) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            try {
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                return code ? code.data : null;
            } catch (e) { return null; }
        }

        async function processImage(canvas) {
            const loading = document.createElement('div');
            loading.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px 30px;border-radius:10px;box-shadow:0 4px 25px rgba(0,0,0,0.3);z-index:9999;';
            loading.textContent = '🔄 Čitam tekst i barkod...';
            document.body.appendChild(loading);

            try {
                await initWorker();
                const barcode = detectBarcode(canvas);
                const processedUrl = preprocessCanvas(canvas);
                const { data: { text } } = await worker.recognize(processedUrl);

                loading.remove();
                showReviewModal(text, barcode, canvas.toDataURL('image/png'));
            } catch (err) {
                loading.remove();
                alert("Greška pri obradi: " + err.message);
            }
        }

        function showReviewModal(ocrText, barcode, imageDataUrl) {
            const listDiv = document.getElementById('checkList');
            listDiv.innerHTML = `<p><strong>Pročitano:</strong><br><small>${ocrText}</small></p>`;

            if (barcode) {
                addField(listDiv, 'sn', 'BARKOD / S/N', barcode);
            }
            addField(listDiv, 'brand', 'Proizvođač', 'BOSCH');
            addField(listDiv, 'model', 'Model', '');
            addField(listDiv, 'matNo', 'Mat/N', ocrText.match(/F01U[A-Z0-9-]+/i)?.[0] || '');
            addField(listDiv, 'description', 'Opis', ocrText.split('\n')[0] || '');

            // Sačuvaj u bazu
            imageDB.push({date: new Date().toISOString(), image: imageDataUrl, ocr: ocrText});
            localStorage.setItem('boschEquipmentDB', JSON.stringify(imageDB));
        }

        function addField(container, id, label, value) {
            if (!value) return;
            const item = document.createElement('div');
            item.className = 'check-item';
            item.innerHTML = `
                <input type="checkbox" id="check_${id}" checked>
                <label style="width:130px">${label}:</label>
                <input type="text" id="val_$$   {id}" value="   $${value}">
            `;
            container.appendChild(item);
        }

        function applyCheckedData() {
            ['brand','model','type','matNo','sn','description'].forEach(id => {
                if (document.getElementById(`check_${id}`)?.checked) {
                    document.getElementById(id).value = document.getElementById(`val_${id}`).value;
                }
            });
            closeModal();
        }

        function closeModal() {
            document.getElementById('reviewModal').style.display = 'none';
        }

        // Kamera funkcije
        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }});
                document.getElementById('video').srcObject = videoStream;
                document.getElementById('cameraContainer').style.display = 'block';
            } catch (err) { alert("Kamera nije dostupna."); }
        }

        function stopCamera() {
            videoStream?.getTracks().forEach(track => track.stop());
            document.getElementById('cameraContainer').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            stopCamera();
            processImage(canvas);
        }

        // Upload
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    processImage(canvas);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Tabela i forma
        document.getElementById('equipmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            count++;
            const tbody = document.querySelector('#dataTable tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${count}</td>
                <td>${document.getElementById('facility').value}</td>
                <td>${document.getElementById('ipAddress').value}</td>
                <td>${document.getElementById('brand').value}</td>
                <td>${document.getElementById('model').value}</td>
                <td>${document.getElementById('type').value}</td>
                <td>${document.getElementById('matNo').value}</td>
                <td>${document.getElementById('sn').value}</td>
                <td>${document.getElementById('description').value}</td>
                <td>${document.getElementById('qty').value}</td>
                <td>${document.getElementById('comment').value}</td>
            `;
            tbody.appendChild(row);

            // Reset polja
            document.getElementById('model').value = '';
            document.getElementById('type').value = '';
            document.getElementById('matNo').value = '';
            document.getElementById('sn').value = '';
            document.getElementById('description').value = '';
            document.getElementById('comment').value = '';
        });

        function exportToCSV() {
            let csv = [];
            let rows = document.querySelectorAll("#dataTable tr");
            for (let i = 0; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
                }
                csv.push(row.join(","));
            }
            const blob = new Blob(["\ufeff" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.download = "evidencija_opreme.csv";
            link.href = URL.createObjectURL(blob);
            link.click();
        }

        async function exportBackup() {
            if (imageDB.length === 0) return alert("Nema sačuvanih slika.");
            const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
            const zip = new JSZip();
            imageDB.forEach((item, i) => {
                const base64 = item.image.split(',')[1];
                zip.file(`etiketa_${i+1}_${item.date.slice(0,19).replace(/:/g,'-')}.png`, base64, {base64: true});
            });
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `bosch_etikete_backup_${new Date().toISOString().slice(0,10)}.zip`;
            link.click();
        }
    </script>
</body>
</html>
